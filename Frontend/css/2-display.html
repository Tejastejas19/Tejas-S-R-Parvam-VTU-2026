<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        span{
            display: block;
            width: 100px;
            height: 100px;
            background-color: yellow;
        }
        div{
            display: inline;
            background-color: aqua;
            width: 100px;
            height: 300px;
        }
    </style>
</head>
<body>
    <h3>1. display block</h3>
    <span>hello</span>
    <span>world></span>

    <h3>2. display inline</h3>
    <div>this is block</div>
    <div>level element </div>
</body>
</html>
