<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Events in JS</h1>
    <p>1. Mouse Events -click, bdlclick, mouseover, mouseout</p>
    <p>2. Keyboard Events -keydown, keyup</p>
    <p>3. Form Events -input, blur, change, submit</p>

    <button id="click1" onclick="handleclick()">click1</button>
    <button id="click2">click2</button>

    <script>
        const handleclick=()=> {
            console.log("clicked the button");
        }

        //imp
        const click2 = document.getElementById("click2");
        click2.addEventListener("mouseout", ()  => {
            handleclick();
        })
    </script>
</body>
</html>
