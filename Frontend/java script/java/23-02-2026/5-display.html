<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>
</head>
<body>
    <h1>Display in Javascript</h1>
    <p>1. console.log()</p>
    <p>2. window.alert()</p>
    <p>3. document.write</p>

    <button onclick="alterWindom()">window alert</button>
    <button onclick="documentWrite()">document write</button>

    <script>
        function alterWindom(){
            window.alert("User clicked the button")
        }
        function documentWrite(){
            document.write("User clicked the button")
        }
    </script>
</body>
</html>
