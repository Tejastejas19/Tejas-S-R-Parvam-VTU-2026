<!doctype html>
<html lang="en">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
</head>

<body>
    <form class="m">
        <div class="mb-3">
            <lable class="form-lable" for="name">Name:</lable>
            <input class="form-control" type="text" name="name" id="name">
        </div>

        <div class="form-floating mb-3">
            <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
            <label for="floatingInput">Email address</label>
        </div>
        <div class="form-floating">
            <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
            <label for="floatingPassword">Password</label>
        </div>

        <!-- <div class="mb-3">
            <label class="form-lable" for="email">Email Id:</label>
            <input class="form-control" type="email" name="email" id="email">
        </div> -->

        <div class="mb-3">
            <label class="form-lable" for="phone">Phone:</label>
            <input class="form-control" type="tel" name="phone" id="phone">
        </div>
<!-- 
        <div class="mb-3">
            <label class="form-lable" for="password">Password</label>
            <input class="form-control" type="password" name="password" id="password">
        </div> -->
        <div class="mb-3">
            <label class="form-label" for="address">Address:</label>
            <textarea class="form-control" rows="5" name="address" id="address"></textarea>
        </div>

        <div class="d-flex gap-2">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="kannada" id="checkDefault">
                <label class="form-check-label" for="checkDefault">
                    kannada
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="tamil" id="checkChecked">
                <label class="form-check-label" for="tamil">
                    tamil
                </label>
            </div>
        </div>
        <label for="rating" class="form-label">give rating</label>
        <input type="range" class="form-range" min="1" max="5" name="rating" id="rating">

                <input class="btn btn-primary" type="reset" value="Clear Form">
        <input class="btn btn-danger" type="submit" value="Submit Form">
    </form>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
</body>

</html>
